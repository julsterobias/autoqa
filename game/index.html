<html>
	<head>
		<title>Run chicken run!</title>
		<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
		<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
		<script src="script.js"></script>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>

		<div class="screenHero">
			<div class="screenHero_con">
				<img src="asset-run.gif">
				<span class="gameTitle">Run Chicken Run!</span>
				<div>
					<input type="text" id="playerNameUser" placeholder="Player Name">
					<button class="button" id="joinGame">Join Game</button><br/><br/>
					<span id="versionGame">v0.0.0.1</span>
				</div>
			</div>
		</div>

		<header>
			<div class="adminControl">
				<input type="text" class="playerName" placeholder="Player Name">
				<button id="add_player" class="button">Add Player</button><button id="restart_game" class="button">Clear Game</button><button id="reset_game" class="button">Reset Game</button><button id="start_game" class="button">Start Game</button>
			</div>
			<div class="raceResultWrapper"><span id="raceResult"></span></div>
		</header>
		
		
		<!-- Game goes here -->
		<div id="gameData"></div>

		<audio autoplay loop id="bgmusic">
			<source src="bgmusic.mp3" type="audio/mpeg">
		</audio>
		
	</body>
</html>
